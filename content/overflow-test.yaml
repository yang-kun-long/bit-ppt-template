      - "Reference 12: Another long reference item with enough words to wrap over multiple lines and trigger the conservative height estimator."
      - "Reference 13: Structured presentation generation should expose preflight reports before writing final PowerPoint files."
      - "Reference 14: Repair prompts can use overflow reports to ask the language model to shorten, split or reclassify content."
      - "Reference 15: Academic templates should keep branding stable while allowing content to vary across research topics."
      - "Reference 16: Native PPTX generation keeps text, tables and shapes editable after automatic layout processing."
